services:
  reac:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /work
    volumes:
      - .:/work

  # Re-export HTML when *.re / *.rdoc / project.toml change (see src/Reac/Reac.csproj <Watch>).
  # docker compose run --rm watch
  watch:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /work
    volumes:
      - .:/work
    # Bind mount from Windows host: inotify often misses edits; polling sees .re saves reliably.
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    command: dotnet watch --project src/Reac/Reac.csproj run -- export-html -p /work --live-reload

  # Static site (nginx): docker compose --profile site up site
  # http://localhost:8080
  site:
    profiles:
      - site
    image: nginx:1.29.7-alpine
    volumes:
      - ./re/generated/html:/usr/share/nginx/html
      - ./docker/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8089:80"
